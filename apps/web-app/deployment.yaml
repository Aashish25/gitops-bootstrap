apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-web-app
  # Note: Do not hardcode the namespace here! 
  # Let the ApplicationSet destination namespace control it.
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-server
  template:
    metadata:
      labels:
        app: web-server
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80