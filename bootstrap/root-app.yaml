apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-bootstrap-app-helm
  # name: root-bootstrap-app  
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Aashish25/gitops-bootstrap.git'
    targetRevision: HEAD
    path: argocd-templates     # Points to the folder containing our ApplicationSets
  destination:
    server: 'https://kubernetes.default.svc' # Deploys back into the local cluster management plane
    namespace: argocd
  syncPolicy:
    retry:
      limit: 2 # Number of times to retry a failed sync (0 is unlimited)
      backoff:
        duration: 5s # Time between retries (e.g., 5s, 2m)
        factor: 2 # Factor by which to multiply duration on each retry
        maxDuration: 3m # Maximum time allowed between retries
    syncOptions:
    - CreateNamespace=true #create if doesn't exists  
    automated:
      prune: true
      selfHeal: true
      